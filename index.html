<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Avenue | Interior & Trading</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

    <div class="ticker-wrapper">
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
        {
        "symbols": [
            {"proName": "FOREXCOM:SPX500", "title": "S&P 500"},
            {"proName": "BITSTAMP:BTCUSD", "title": "Bitcoin"},
            {"proName": "FX_IDC:INRUSD", "title": "USD/INR"},
            {"proName": "OANDA:XAUUSD", "title": "Gold"}
        ],
        "showSymbolLogo": true,
        "colorTheme": "dark",
        "isTransparent": false,
        "displayMode": "adaptive",
        "locale": "en"
        }
        </script>
    </div>

    <nav>
        <div class="logo">LUXURY AVENUE</div>
    </nav>

    <header class="hero">
        <div class="overlay"></div>
        <div class="hero-content">
            <h1>Luxury Avenue</h1>
            <p>Exquisite Interior Design & Trading Solutions</p>
            <div class="owner-tag">Owner: Deepanshu</div>
        </div>
    </header>

    <section class="gallery-section">
        <h2>Our Masterpieces</h2>
        <div class="divider"></div>
        <div class="gallery-grid">
            <div class="img-card">
                <img src="https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?q=80&w=2000" alt="Modern Living Room">
                <p>Modern Minimalism</p>
            </div>
            <div class="img-card">
                <img src="https://images.unsplash.com/photo-1616486341351-70252447c574?q=80&w=2000" alt="Luxury Bedroom">
                <p>Royal Comfort</p>
            </div>
            <div class="img-card">
                <img src="https://images.unsplash.com/photo-1600210492486-724fe5c67fb0?q=80&w=2000" alt="Premium Kitchen">
                <p>Elite Kitchens</p>
            </div>
            <div class="img-card">
                <img src="https://images.unsplash.com/photo-1615876234886-fd9a39faa97f?q=80&w=2000" alt="Office Space">
                <p>Executive Spaces</p>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Luxury Avenue | Built by Deepanshu</p>
    </footer>

</body>
</html>
